name: Deploy Backend to GCP Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-gcp.yml'
  workflow_dispatch: # Allows manual triggering from GitHub UI

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }} # Google Cloud Project ID
  REGION: us-central1                        # Google Cloud Region
  SERVICE: community-hero-api                # Cloud Run Service Name
  REPOSITORY: community-hero-repo            # Artifact Registry Docker repository name
  GAR_LOCATION: us-central1                  # Artifact Registry Location

jobs:
  deploy:
    name: Build & Deploy to Cloud Run
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write # Required for Workload Identity Federation

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Authentication
      # Method A (Recommended for production): Workload Identity Federation
      # Method B (Simplest): Service Account Key
      # We default to Service Account Key authentication via secrets.GCP_SA_KEY
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # Setup gcloud CLI
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # Authenticate Docker to Google Artifact Registry
      - name: Configure Docker Authentication
        run: |
          gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

      # Build and Push the Docker Image
      - name: Build and Push Docker Image
        run: |
          docker build -t "${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE }}:${{ github.sha }}" ./backend
          docker push "${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE }}:${{ github.sha }}"

      # Deploy the image to Google Cloud Run
      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE }}:${{ github.sha }}
          # Cloud Run configuration parameters
          flags: |
            --allow-unauthenticated
            --port=8000
            --memory=512Mi
            --cpu=1
            --max-instances=5

      # Output the URL of the deployed Cloud Run service
      - name: Show Cloud Run Service URL
        run: |
          echo "Service URL is: ${{ steps.deploy.outputs.url }}"
